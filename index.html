<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>лђЄмЦС л¶ђлєМ вАФ 8th Wall(SLAM) √Ч NFC</title>
<link rel="icon" href="data:," />
<style>
  :root { --ink:#e9e9ee; --dim:#9a9aa6; --line:rgba(255,255,255,.18); }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:#000; color:var(--ink); overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Pretendard,sans-serif; }
  #camerafeed { position:fixed; inset:0; width:100%; height:100%; }

  .hud { position:fixed; left:50%; transform:translateX(-50%); z-index:10; }
  .hidden { display:none !important; }

  #intro { position:fixed; inset:0; z-index:30; background:radial-gradient(120% 80% at 50% 0%, #14141a 0%, #000 70%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; padding:32px; text-align:center; }
  #intro .kicker { font-size:12px; letter-spacing:.32em; color:var(--dim); text-transform:uppercase; }
  #intro h1 { font-size:32px; font-weight:300; letter-spacing:.14em; margin:0; }
  #intro p { color:var(--dim); font-size:14px; line-height:1.7; max-width:360px; margin:0; }
  .btn { appearance:none; border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--ink);
    padding:15px 30px; border-radius:999px; font-size:15px; letter-spacing:.12em; cursor:pointer; backdrop-filter:blur(8px); }
  .btn.primary { background:#fff; color:#000; border-color:#fff; font-weight:500; }
  .btn:active { transform:scale(.97); }
  .link { color:var(--ink); font-size:13px; letter-spacing:.04em; text-decoration:none; border-bottom:1px solid var(--line); padding-bottom:3px; }

  #status { top:max(16px,env(safe-area-inset-top)); padding:9px 18px; border-radius:999px;
    background:rgba(0,0,0,.45); border:1px solid var(--line); font-size:13px; letter-spacing:.08em; backdrop-filter:blur(8px); }
  #status.live { background:rgba(120,255,210,.14); border-color:rgba(120,255,210,.5); }

  #controls { bottom:max(18px,env(safe-area-inset-bottom)); width:min(560px,94vw);
    display:flex; flex-direction:column; gap:9px; align-items:center; }
  .row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .chip { border:1px solid var(--line); background:rgba(0,0,0,.4); color:var(--ink); padding:10px 15px;
    border-radius:999px; font-size:13px; letter-spacing:.06em; cursor:pointer; backdrop-filter:blur(8px); }
  .chip.active { background:#fff; color:#000; border-color:#fff; }
  .sw { width:30px; height:30px; border-radius:50%; border:2px solid rgba(255,255,255,.35); cursor:pointer; padding:0; }
  .sw.active { border-color:#fff; box-shadow:0 0 0 2px #000,0 0 0 4px #fff; }

  #error { position:fixed; inset:auto 16px 16px; z-index:40; background:#2a1212; border:1px solid #6b2b2b;
    color:#ffd7d7; padding:14px 16px; border-radius:12px; font-size:13px; line-height:1.6; }
</style>
</head>
<body>
  <canvas id="camerafeed"></canvas>

  <div id="intro">
    <div class="kicker">8th Wall ¬Ј SLAM ¬Ј NFC</div>
    <h1>лђЄ мЦС л¶ђ лєМ</h1>
    <p>мєілУЬл•Љ лєДмґФл©і лђЄмЦСмЧР лєЫмЭі мЪ©м†СлРЬ лУѓ лґЩмЦі нНЉмІСлЛИлЛ§.<br/><b>мЭЄмЗДлђЉ</b>мЭі к∞АмЮ• мХИм†Хм†БмЮЕлЛИлЛ§.</p>
    <a class="link" href="./assets/munyang.png" target="_blank" rel="noopener">вС† нГАкєГ мЭілѓЄмІА(лђЄмЦС) мЧікЄ∞ вЖТ мЭЄмЗД кґМмЮ•</a>
    <button class="btn primary" id="startBtn">вЬ¶ вС° мєіл©ФлЭЉ мЛЬмЮС</button>
  </div>

  <div id="status" class="hud hidden">нГАкєГмЭД лєДмґФмДЄмЪФ</div>

  <div id="controls" class="hud hidden">
    <div class="row" id="modeRow">
      <button class="chip active" data-mode="0">л∞©мВђ лЄФл£Є</button>
      <button class="chip" data-mode="1">лЭЉмЭЄ мК§мЬХ</button>
      <button class="chip" data-mode="2">нММнЛ∞нБі</button>
      <button class="chip" data-mode="3">нОДмК§</button>
    </div>
    <div class="row" id="colorRow">
      <button class="sw active" style="background:#ffcf66" data-color="#ffcf66"></button>
      <button class="sw" style="background:#66f0ff" data-color="#66f0ff"></button>
      <button class="sw" style="background:#ff77dd" data-color="#ff77dd"></button>
      <button class="sw" style="background:#8dff9b" data-color="#8dff9b"></button>
      <button class="sw" style="background:#ffffff" data-color="#ffffff"></button>
    </div>
    <div class="row" id="utilRow">
      <button class="chip" id="replayBtn">вЖї лЛ§мЛЬ</button>
      <button class="chip" id="flipXBtn">вЖФ мҐМмЪ∞</button>
      <button class="chip" id="flipYBtn">вЖХ мГБнХШ</button>
    </div>
  </div>

  <div id="error" class="hidden"></div>

  <!-- three.jsл•Љ м†ДмЧ≠мЬЉл°Ь (8th Wall мЧФмІДмЭі window.THREE мЪФкµђ) -->
  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.150.1/build/three.module.js';
    window.THREE = THREE;
  </script>
  <!-- 8th Wall мШ§нФИмЖМмК§ мЧФмІД л∞ФмЭілДИл¶ђ (SLAM + мЭілѓЄмІАнГАкєГ) -->
  <!-- data-preload-chunks="slam": мЧФмІДмЭі SLAM м≤≠нБђ(xr-slam.js)л•Љ лѓЄл¶ђ л°ЬлУЬнХімХЉ XR8.XrControllerк∞А м±ДмЫМмІР -->
  <script async src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" data-preload-chunks="slam"></script>

  <script>
  // ===== л≥ім†Х мГБмИШ (нП∞мЧРмДЬ нЛАмЦімІАл©і мЧђкЄ∞лІМ м°∞м†Х) =====
  const PLANE_ASPECT = 1.0;     // нГАкєГ height/width (munyang м†ХмВђк∞Б=1.0)
  const EXTRA_ROT_X  = 0.0;     // нПЙл©імЭі мєілУЬмЧР мИШмІБмЭіл©і -Math.PI/2 лУ±мЬЉл°Ь
  const SCALE_MULT   = 1.0;     // кЄАл°ЬмЪ∞к∞А мєілУЬл≥ілЛ§ нБђ/мЮСмЬЉл©і 0.9~1.1 м°∞м†Х
  const REVEAL_SEC   = 2.2;
  const TARGET_NAME  = 'munyang';

  const $ = (s) => document.querySelector(s);
  const showError = (m) => { const e=$('#error'); e.textContent=m; e.classList.remove('hidden'); };

  // ===== кЄАл°ЬмЪ∞ мЕ∞мЭілНФ (лђЄмЦС мЮЙнБђл•Љ лФ∞лЭЉ лєЫмЭі нНЉмІР) =====
  const vert = `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`;
  const frag = `
    precision highp float;
    varying vec2 vUv;
    uniform float uTime,uProgress,uMode,uAspect,uHasTex,uFlipX,uFlipY;
    uniform sampler2D uTex; uniform vec3 uColor;
    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
    void main(){
      vec2 uv=vUv;
      vec2 suv=vec2(uFlipX>0.5?1.0-uv.x:uv.x, uFlipY>0.5?1.0-uv.y:uv.y);
      float ink=0.0;
      if(uHasTex>0.5){
        vec3 t=texture2D(uTex,suv).rgb;
        float lum=dot(t,vec3(0.299,0.587,0.114));
        float sat=max(t.r,max(t.g,t.b))-min(t.r,min(t.g,t.b));
        ink=clamp(max(1.0-smoothstep(0.32,0.55,lum), sat*1.6),0.0,1.0);
      }
      vec2 c=(uv-0.5)*vec2(uAspect,1.0); float d=length(c);
      float gate=0.0;
      if(uMode<0.5){ float r=uProgress*1.05; gate=1.0-smoothstep(r-0.15,r,d); gate+=(1.0-smoothstep(0.0,0.08,abs(d-r)))*0.6; }
      else if(uMode<1.5){ float f=uProgress; gate=1.0-smoothstep(f-0.20,f,uv.x); gate+=(1.0-smoothstep(0.0,0.04,abs(uv.x-f)))*0.8; }
      else if(uMode<2.5){ vec2 g=vec2(26.0*uAspect,26.0); vec2 id=floor(uv*g); float h=hash(id);
        float thr=d*1.0+h*0.25; gate=smoothstep(thr,thr+0.05,uProgress)*(0.6+0.4*sin(uTime*6.0+h*40.0)); }
      else { gate=0.5+0.5*pow(0.5+0.5*sin(uTime*2.4),2.0); }
      gate=clamp(gate,0.0,1.25);
      float glow=clamp(ink*gate,0.0,1.3);
      vec3 col=uColor*glow*1.7 + vec3(1.0)*pow(glow,2.2)*0.9;
      gl_FragColor=vec4(col, clamp(glow,0.0,0.98));
    }`;

  let uniforms, anchorObj, mesh, t0=0, revealStart=0, tracking=false, targetJson=null;

  // ===== 8th Wall нММмЭінФДлЭЉмЭЄ л™®лУИ =====
  const glowPipelineModule = () => {
    const place = ({detail}) => {
      if (detail.name !== TARGET_NAME || !anchorObj) return;
      if (!tracking) { tracking=true; revealStart=(performance.now()-t0)/1000;
        $('#status').textContent='вЬ¶ л¶ђлєМ'; $('#status').classList.add('live'); }
      anchorObj.visible = true;
      anchorObj.position.copy(detail.position);
      anchorObj.quaternion.copy(detail.rotation);
      const s = detail.scale * SCALE_MULT;
      anchorObj.scale.set(s, s, s);
      // мЧФмІДмЭі м£ЉлКФ нГАкєГ мЛ§м†Ь мҐЕнЪ°лєДл°Ь нПЙл©імЭД лІЮмґ§(нХШлУЬмљФлФ© лМАмЛ†) вЖТ мєілУЬмЧР лФ± лІЮмґ§
      const sw = detail.scaledWidth || 1, sh = detail.scaledHeight || 1;
      if (mesh) mesh.scale.set(sw, sh, 1);
      uniforms.uAspect.value = sw / sh;
    };
    const lose = ({detail}) => {
      if (detail.name !== TARGET_NAME || !anchorObj) return;
      tracking=false; anchorObj.visible=false;
      $('#status').textContent='нГАкєГмЭД лєДмґФмДЄмЪФ'; $('#status').classList.remove('live');
    };
    return {
      name: 'glow',
      onStart: () => {
        const { scene } = XR8.Threejs.xrScene();
        const mat = new THREE.ShaderMaterial({ vertexShader:vert, fragmentShader:frag, uniforms,
          transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, depthTest:false });
        mesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), mat);  // мҐЕнЪ°лєДлКФ мґФм†Б мЛЬ detail.scaledWidth/Heightл°Ь лІЮмґ§
        mesh.rotation.x = EXTRA_ROT_X;            // мЭілѓЄмІАнГАкєГмЭА detail.rotationмЭі нПЙл©імЭД м†Хл†ђ вЖТ кЄ∞л≥Є 0
        anchorObj = new THREE.Group();            // detail(мЬДмєШ/нЪМм†Д/мК§мЉАмЭЉ)мЭД л∞ЫлКФ мХµмї§
        anchorObj.add(mesh);
        anchorObj.visible = false;
        scene.add(anchorObj);
        new THREE.TextureLoader().load('./assets/munyang.png', (tex)=>{ uniforms.uTex.value=tex; uniforms.uHasTex.value=1; });
        XR8.XrController.configure({ imageTargetData: [targetJson] });
        $('#intro').classList.add('hidden');
        $('#status').classList.remove('hidden');
        $('#controls').classList.remove('hidden');
      },
      onUpdate: () => {
        const t=(performance.now()-t0)/1000;
        uniforms.uTime.value=t;
        uniforms.uProgress.value = tracking ? Math.min((t-revealStart)/REVEAL_SEC,1) : 0;
      },
      listeners: [
        { event:'reality.imagefound',  process: place },
        { event:'reality.imageupdated',process: place },
        { event:'reality.imagelost',   process: lose },
      ],
    };
  };

  function startAR(){
    try {
      uniforms = {
        uTime:{value:0}, uProgress:{value:0}, uMode:{value:0}, uAspect:{value:1/PLANE_ASPECT},
        uHasTex:{value:0}, uTex:{value:null}, uFlipX:{value:0}, uFlipY:{value:0},
        uColor:{value:new THREE.Color('#ffcf66')}
      };
      t0 = performance.now();
      const canvas = $('#camerafeed');
      XR8.addCameraPipelineModules([
        XR8.GlTextureRenderer.pipelineModule(),
        XR8.Threejs.pipelineModule(),
        XR8.XrController.pipelineModule(),
        glowPipelineModule(),
      ]);
      XR8.run({ canvas });
    } catch (e) { showError('AR мЛЬмЮС мЛ§нМ®: ' + (e && e.message ? e.message : e)); }
  }

  // XR8 нХШмЬД л™®лУИ(XrController лУ±)мЭА 'xrloaded' мЭінЫД лєДлПЩкЄ∞л°Ь м±ДмЫМмІР(міИкЄ∞мЧФ null).
  // вЖТ window.XR8 м°імЮђк∞А мХДлЛИлЭЉ мЛ§м†Ь л™®лУИмЭі м§АлєДлРРлКФмІА нПілІБнХЬлЛ§.
  function whenReady(cb){
    let waited = 0;
    (function p(){
      const X = window.XR8;
      if (window.THREE && X && X.GlTextureRenderer && X.Threejs && X.XrController) return cb();
      if ((waited += 60) > 12000) return showError('AR мЧФмІД л°ЬлУЬ мЛЬк∞Д міИк≥Љ(XR8 л™®лУИ лѓЄм§АлєД). мГИл°Ьк≥†мє® нЫД лЛ§мЛЬ мЛЬлПДнХі м£ЉмДЄмЪФ.');
      setTimeout(p, 60);
    })();
  }

  $('#startBtn').addEventListener('click', async () => {
    try {
      if (!targetJson) targetJson = await (await fetch('./image-targets/munyang.json')).json();
      whenReady(startAR);
    } catch(e){ showError('нГАкєГ л°ЬлУЬ мЛ§нМ®: ' + (e && e.message ? e.message : e)); }
  });

  // мї®нКЄл°§
  $('#modeRow').addEventListener('click', (e)=>{ const b=e.target.closest('[data-mode]'); if(!b||!uniforms)return;
    uniforms.uMode.value=parseInt(b.dataset.mode,10); revealStart=(performance.now()-t0)/1000;
    [...$('#modeRow').children].forEach(c=>c.classList.toggle('active',c===b)); });
  $('#colorRow').addEventListener('click', (e)=>{ const b=e.target.closest('[data-color]'); if(!b||!uniforms)return;
    uniforms.uColor.value.set(b.dataset.color);
    [...document.querySelectorAll('.sw')].forEach(c=>c.classList.toggle('active',c===b)); });
  $('#replayBtn').addEventListener('click', ()=>{ if(uniforms) revealStart=(performance.now()-t0)/1000; });
  $('#flipXBtn').addEventListener('click', (e)=>{ if(!uniforms)return; uniforms.uFlipX.value=uniforms.uFlipX.value>0.5?0:1; e.currentTarget.classList.toggle('active'); });
  $('#flipYBtn').addEventListener('click', (e)=>{ if(!uniforms)return; uniforms.uFlipY.value=uniforms.uFlipY.value>0.5?0:1; e.currentTarget.classList.toggle('active'); });
  </script>
</body>
</html>
