<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>문양 리빌 — NFC × WebAR 프로토타입</title>
<link rel="icon" href="data:," />
<style>
  :root { --ink:#e9e9ee; --dim:#9a9aa6; --line:rgba(255,255,255,.18); }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:#000; color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Pretendard,sans-serif; overflow:hidden; }
  #container { position:fixed; inset:0; }
  #container video, #container canvas { position:absolute; inset:0; width:100%!important; height:100%!important; object-fit:cover; }

  .hud { position:fixed; left:50%; transform:translateX(-50%); z-index:10; }
  .hidden { display:none !important; }

  #intro { position:fixed; inset:0; z-index:30; background:radial-gradient(120% 80% at 50% 0%, #14141a 0%, #000 70%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; padding:32px; text-align:center; }
  #intro .kicker { font-size:12px; letter-spacing:.32em; color:var(--dim); text-transform:uppercase; }
  #intro h1 { font-size:34px; font-weight:300; letter-spacing:.18em; margin:0; }
  #intro p { color:var(--dim); font-size:14px; line-height:1.7; max-width:340px; margin:0; }
  .btn { appearance:none; border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--ink);
    padding:15px 30px; border-radius:999px; font-size:15px; letter-spacing:.12em; cursor:pointer; backdrop-filter:blur(8px); }
  .btn.primary { background:#fff; color:#000; border-color:#fff; font-weight:500; }
  .btn:active { transform:scale(.97); }
  .link { color:var(--ink); font-size:13px; letter-spacing:.04em; text-decoration:none; border-bottom:1px solid var(--line); padding-bottom:3px; }
  .warn { color:#ffb86b; font-size:12.5px; max-width:320px; line-height:1.6; }

  #status { top:max(16px,env(safe-area-inset-top)); padding:9px 18px; border-radius:999px;
    background:rgba(0,0,0,.45); border:1px solid var(--line); font-size:13px; letter-spacing:.08em; backdrop-filter:blur(8px); }
  #status.live { background:rgba(120,255,210,.14); border-color:rgba(120,255,210,.5); }

  #controls { bottom:max(20px,env(safe-area-inset-bottom)); width:min(560px,94vw);
    display:flex; flex-direction:column; gap:10px; align-items:center; }
  .row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .chip { border:1px solid var(--line); background:rgba(0,0,0,.4); color:var(--ink); padding:10px 15px;
    border-radius:999px; font-size:13px; letter-spacing:.06em; cursor:pointer; backdrop-filter:blur(8px); }
  .chip.active { background:#fff; color:#000; border-color:#fff; }
  .sw { width:30px; height:30px; border-radius:50%; border:2px solid rgba(255,255,255,.35); cursor:pointer; padding:0; }
  .sw.active { border-color:#fff; box-shadow:0 0 0 2px #000,0 0 0 4px #fff; }

  #error { position:fixed; inset:auto 16px 16px; z-index:40; background:#2a1212; border:1px solid #6b2b2b;
    color:#ffd7d7; padding:14px 16px; border-radius:12px; font-size:13px; line-height:1.6; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
  }
}
</script>
</head>
<body>
  <div id="container"></div>

  <div id="intro">
    <div class="kicker">NFC × WebAR · MindAR</div>
    <h1>문 양 리 빌</h1>
    <p>카드를 비추면 문양 라인을 따라 빛이 퍼집니다.<br/>먼저 <b>타깃 이미지</b>를 다른 화면에 띄우거나 인쇄하세요.</p>
    <a class="link" id="targetLink"
       href="./assets/munyang.png"
       target="_blank" rel="noopener">① 타깃 이미지(문양) 열기 →</a>
    <button class="btn primary" id="startBtn">✦ ② 카메라 시작</button>
    <div id="secure" class="warn hidden">⚠ HTTPS(보안 연결)에서만 카메라가 열립니다. README의 호스팅 방법을 보세요.</div>
  </div>

  <div id="status" class="hud hidden">타깃을 비추세요</div>

  <div id="controls" class="hud hidden">
    <div class="row" id="modeRow">
      <button class="chip active" data-mode="0">방사 블룸</button>
      <button class="chip" data-mode="1">라인 스윕</button>
      <button class="chip" data-mode="2">파티클</button>
      <button class="chip" data-mode="3">펄스</button>
    </div>
    <div class="row" id="colorRow">
      <button class="sw active" style="background:#66f0ff" data-color="#66f0ff"></button>
      <button class="sw" style="background:#ffcf66" data-color="#ffcf66"></button>
      <button class="sw" style="background:#ff77dd" data-color="#ff77dd"></button>
      <button class="sw" style="background:#8dff9b" data-color="#8dff9b"></button>
      <button class="sw" style="background:#ffffff" data-color="#ffffff"></button>
    </div>
    <div class="row" id="utilRow">
      <button class="chip" id="replayBtn">↻ 다시</button>
      <button class="chip active" id="flipXBtn">↔ 좌우</button>
      <button class="chip" id="flipYBtn">↕ 상하</button>
    </div>
  </div>

  <div id="error" class="hidden"></div>

<script type="module">
import * as THREE from 'three';
import { MindARThree } from 'mindar-image-three';

const TARGET_SRC    = './assets/targets.mind';   // munyang 문양 컴파일 타깃
const TEX_SRC       = './assets/munyang.png';    // 같은 문양 = 마스크
const TARGET_ASPECT = 1.0;    // munyang(1024×1024) 정사각 = 1.0. 자체 문양이면 그 비율로.
const REVEAL_SEC    = 2.2;

const $ = (s) => document.querySelector(s);
if (!window.isSecureContext) $('#secure').classList.remove('hidden');

const vert = `
  varying vec2 vUv;
  void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
`;
// 문양(잉크)만 골라 빛내고, 리빌 게이트로 그 위를 빛이 퍼지게 한다. flip 유니폼으로 정렬 보정.
const frag = `
  precision highp float;
  varying vec2 vUv;
  uniform float uTime, uProgress, uMode, uAspect, uHasTex, uFlipX, uFlipY;
  uniform sampler2D uTex;
  uniform vec3 uColor;
  float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
  void main(){
    vec2 uv = vUv;
    // 문양 마스크: 어둡거나 채도 높은 '마크'만 1 (밝은 배경 제외) → 빛이 문양을 따라감
    vec2 suv = vec2(uFlipX > 0.5 ? 1.0 - uv.x : uv.x, uFlipY > 0.5 ? 1.0 - uv.y : uv.y);
    float ink = 0.0;
    if(uHasTex > 0.5){
      vec3 t = texture2D(uTex, suv).rgb;
      float lum  = dot(t, vec3(0.299,0.587,0.114));
      float maxc = max(t.r, max(t.g, t.b));
      float minc = min(t.r, min(t.g, t.b));
      float sat  = maxc - minc;
      float darkInk = 1.0 - smoothstep(0.32, 0.55, lum);
      ink = clamp(max(darkInk, sat * 1.6), 0.0, 1.0);
    }
    // 리빌 게이트: 빛이 어디까지 퍼졌는가 (0..1)
    vec2 c = (uv - 0.5) * vec2(uAspect, 1.0);
    float d = length(c);
    float gate = 0.0;
    if(uMode < 0.5){                 // 방사 블룸
      float r = uProgress * 1.05;
      gate  = 1.0 - smoothstep(r - 0.15, r, d);
      gate += (1.0 - smoothstep(0.0, 0.08, abs(d - r))) * 0.6;
    } else if(uMode < 1.5){          // 라인 스윕(가로)
      float f = uProgress;
      gate  = 1.0 - smoothstep(f - 0.20, f, uv.x);
      gate += (1.0 - smoothstep(0.0, 0.04, abs(uv.x - f))) * 0.8;
    } else if(uMode < 2.5){          // 파티클 확산
      vec2 g = vec2(26.0*uAspect, 26.0);
      vec2 id = floor(uv * g);
      float h = hash(id);
      float thr = d * 1.0 + h * 0.25;
      gate = smoothstep(thr, thr + 0.05, uProgress) * (0.6 + 0.4*sin(uTime*6.0 + h*40.0));
    } else {                         // 에미시브 펄스
      gate = 0.5 + 0.5*pow(0.5 + 0.5*sin(uTime*2.4), 2.0);
    }
    gate = clamp(gate, 0.0, 1.25);
    float glow = clamp(ink * gate, 0.0, 1.3);
    vec3 col = uColor * glow * 1.7 + vec3(1.0) * pow(glow, 2.2) * 0.9;
    gl_FragColor = vec4(col, clamp(glow, 0.0, 0.98));
  }
`;

const uniforms = {
  uTime:{value:0}, uProgress:{value:0}, uMode:{value:0}, uAspect:{value:1/TARGET_ASPECT},
  uHasTex:{value:0}, uTex:{value:null}, uFlipX:{value:1}, uFlipY:{value:0},
  uColor:{value:new THREE.Color('#66f0ff')}
};

let mindar, plane, revealStart = 0, tracking = false;
const clock = new THREE.Clock();

function showError(msg){ const e = $('#error'); e.textContent = msg; e.classList.remove('hidden'); }

async function start(){
  try {
    mindar = new MindARThree({ container: $('#container'), imageTargetSrc: TARGET_SRC });
    const { renderer, scene, camera } = mindar;

    const mat = new THREE.ShaderMaterial({
      vertexShader: vert, fragmentShader: frag, uniforms,
      transparent:true, blending:THREE.AdditiveBlending, depthWrite:false
    });
    plane = new THREE.Mesh(new THREE.PlaneGeometry(1, TARGET_ASPECT), mat);
    plane.visible = false;

    // 타깃의 인쇄 문양을 마스크로 사용 (빛이 그 문양을 따라가도록)
    new THREE.TextureLoader().load(TEX_SRC, (tex) => { uniforms.uTex.value = tex; uniforms.uHasTex.value = 1; });

    const anchor = mindar.addAnchor(0);
    anchor.group.add(plane);
    anchor.onTargetFound = () => { tracking = true; revealStart = clock.getElapsedTime();
      plane.visible = true; const s = $('#status'); s.textContent = '✦ 리빌'; s.classList.add('live'); };
    anchor.onTargetLost = () => { tracking = false; plane.visible = false;
      const s = $('#status'); s.textContent = '타깃을 비추세요'; s.classList.remove('live'); };

    await mindar.start();
    renderer.setAnimationLoop(() => {
      const t = clock.getElapsedTime();
      uniforms.uTime.value = t;
      uniforms.uProgress.value = tracking ? Math.min((t - revealStart) / REVEAL_SEC, 1) : 0;
      renderer.render(scene, camera);
    });

    $('#intro').classList.add('hidden');
    $('#status').classList.remove('hidden');
    $('#controls').classList.remove('hidden');
  } catch (err) {
    showError('카메라/AR 시작 실패: ' + (err && err.message ? err.message : err) + ' — HTTPS·카메라 권한을 확인하세요.');
  }
}

$('#startBtn').addEventListener('click', start);

$('#modeRow').addEventListener('click', (e) => {
  const b = e.target.closest('[data-mode]'); if(!b) return;
  uniforms.uMode.value = parseInt(b.dataset.mode, 10);
  revealStart = clock.getElapsedTime();
  [...$('#modeRow').children].forEach(c => c.classList.toggle('active', c === b));
});
$('#colorRow').addEventListener('click', (e) => {
  const b = e.target.closest('[data-color]'); if(!b) return;
  uniforms.uColor.value.set(b.dataset.color);
  [...document.querySelectorAll('.sw')].forEach(c => c.classList.toggle('active', c === b));
});
$('#replayBtn').addEventListener('click', () => { revealStart = clock.getElapsedTime(); });
$('#flipXBtn').addEventListener('click', (e) => { uniforms.uFlipX.value = uniforms.uFlipX.value > 0.5 ? 0 : 1; e.currentTarget.classList.toggle('active'); });
$('#flipYBtn').addEventListener('click', (e) => { uniforms.uFlipY.value = uniforms.uFlipY.value > 0.5 ? 0 : 1; e.currentTarget.classList.toggle('active'); });
</script>
</body>
</html>
